{% set name = "ties" %}
{% set version = "3.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/UCL-CCS/TIES/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 183c2c319550ab5748fea069f490a0371ae5547a968daa4e832354019a77a7ec

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  noarch: python
  entry_points:
    - ties = ties:cli.command_line_script

requirements:
  host:
    - python {{ python_min }}
    - pip
    - cython
    - setuptools
  run:
    - python {{ python_min }}
    - ambertools >=21.0
    - matplotlib-base
    - networkx
    - tabulate
    - MDAnalysis
    - dimod
    - rdkit
    - numpy <2.3

test:
  imports:
    - ties
  requires:
    - python {{ python_min }}
    - pip
    - pytest
  commands:
    - pip check
    - ties --help
    - python -m ties.testing.run

about:
  home: https://github.com/UCL-CCS/TIES20
  summary: Topology Superimposition based on joint graph traversal.
  description: |
    Topology Superimposition based on joint graph traversal.
  license: MIT
  license_file: LICENSE
  doc_url: https://www.ties-service.org/
  dev_url: https://github.com/UCL-CCS/TIES20

extra:
  recipe-maintainers:
    - bieniekmateusz
    - adw62
